name: FireFusion Multi-API CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Basic API Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FireFusion API dependencies
        run: |
          if [ -f backend/firefusion-api/requirements.txt ]; then
            pip install -r backend/firefusion-api/requirements.txt
          fi

      - name: Install Aggregator API dependencies
        run: |
          if [ -f backend/aggregator-api/requirements.txt ]; then
            pip install -r backend/aggregator-api/requirements.txt
          fi

      - name: Install Model API dependencies
        run: |
          if [ -f backend/model-api/requirements.txt ]; then
            pip install -r backend/model-api/requirements.txt
          fi

  docker-build-push:
    name: Build and Push API Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - service: firefusion-api
            context: ./backend/firefusion-api
            dockerfile: ./backend/firefusion-api/Dockerfile
            image: ghcr.io/${{ github.repository }}/firefusion-api

          - service: aggregator-api
            context: ./backend/aggregator-api
            dockerfile: ./backend/aggregator-api/Dockerfile
            image: ghcr.io/${{ github.repository }}/aggregator-api

          # Enable once Dockerfile is added
          # - service: model-api
          #   context: ./backend/model-api
          #   dockerfile: ./backend/model-api/Dockerfile
          #   image: ghcr.io/${{ github.repository }}/model-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}